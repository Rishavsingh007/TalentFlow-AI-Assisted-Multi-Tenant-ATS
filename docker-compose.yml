services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: talentflow
      POSTGRES_PASSWORD: talentflow
      POSTGRES_DB: talentflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentflow -d talentflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://talentflow:talentflow@db:5432/talentflow
      REDIS_URL: redis://redis:6379/0
      EMAIL_HOST: mailhog
      EMAIL_PORT: 1025
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    command: celery -A config worker -l info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://talentflow:talentflow@db:5432/talentflow
      REDIS_URL: redis://redis:6379/0
      EMAIL_HOST: mailhog
      EMAIL_PORT: 1025
      # Avoid racing web on migrate (both share the same entrypoint).
      SKIP_MIGRATE: "1"
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  media_data:
